<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Wake in the Depths</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0806;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: 'Courier New', Courier, monospace;
    }

    /* ── Canvas ──────────────────────────────────────────────── */
    canvas#game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      flex-shrink: 0;
      max-width: 100%;
    }

    /* ── Controls panel ──────────────────────────────────────── */
    #controls {
      width: 100%;
      background: #0d0b08;
      border-top: 1px solid #2a2018;
      padding: 8px 10px 12px;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Shared button base ──────────────────────────────────── */
    .btn {
      background: #1c1810;
      border: 1px solid #3a3028;
      border-bottom: 3px solid #2e2618;
      color: #c8a96a;
      border-radius: 6px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 60ms, border-bottom-width 60ms, transform 60ms;
    }
    .btn:active, .btn.pressed {
      background: #2e2818;
      border-bottom-width: 1px;
      transform: translateY(2px);
    }
    .btn:active > *, .btn.pressed > * { pointer-events: none; }

    /* ── Minimap + stats ─────────────────────────────────────── */
    #ctrl-minimap {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
    }

    #minimap-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 1px solid #2a2018;
    }

    #minimap-stats {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 10px;
      line-height: 1.3;
      color: #6a5a40;
    }
    #minimap-stats .stat-hp    { color: #c8a96a; }
    #minimap-stats .stat-floor { color: #7a6a50; }
    #minimap-stats .stat-dir   { color: #5a4a34; }

    /* ── D-pad ───────────────────────────────────────────────── */
    #ctrl-dpad {
      display: grid;
      grid-template-columns: repeat(3, var(--btn-size));
      grid-template-rows:    repeat(2, var(--btn-size));
      gap: 4px;
      flex-shrink: 0;
    }

    .btn-dpad {
      width:  var(--btn-size);
      height: var(--btn-size);
      font-size: 20px;
      line-height: 1;
    }

    /* ── Action column ───────────────────────────────────────── */
    #ctrl-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
      min-width: 0;
    }

    /* ATTACK — large, red */
    .btn-attack {
      background: #2a1010;
      border: 1px solid #6a2828;
      border-bottom: 4px solid #4a1818;
      color: #e86060;
      font-size: 18px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      height: var(--btn-attack-h);
      width: 100%;
    }
    .btn-attack:active, .btn-attack.pressed {
      background: #3a1818;
      color: #ff8080;
    }

    /* Secondary button row */
    .btn-row {
      display: flex;
      gap: 6px;
    }

    /* USE ITEM — amber */
    .btn-use {
      background: #1a1608;
      border: 1px solid #5a4a18;
      border-bottom: 3px solid #3a3010;
      color: #d4a840;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      height: var(--btn-sec-h);
      flex: 1;
    }
    .btn-use:active, .btn-use.pressed { background: #2a2410; color: #f0c860; }

    /* INTERACT — teal */
    .btn-interact {
      background: #08181a;
      border: 1px solid #1a4a50;
      border-bottom: 3px solid #102e32;
      color: #40a8b8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      height: var(--btn-sec-h);
      flex: 1;
    }
    .btn-interact:active, .btn-interact.pressed { background: #102428; color: #60c8d8; }

    /* MENU / INVENTORY — muted */
    .btn-aux {
      background: #141210;
      border: 1px solid #2e2618;
      border-bottom: 2px solid #201a10;
      color: #5a4a34;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      height: var(--btn-aux-h);
      flex: 1;
    }
    .btn-aux:active, .btn-aux.pressed { background: #201c12; color: #8a7a54; }

    /* ── Combat log ──────────────────────────────────────────── */
    #ctrl-log {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 60px;
      min-width: 0;
    }

    #combat-log {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 11px;
      line-height: 1.4;
      word-break: break-word;
    }

    /* ═══════════════════════════════════════════════════════════
       WIDE LAYOUT  (≥ 560 px — landscape phone, tablet, desktop)
       Controls: single flex row  [minimap | dpad | actions | log]
       ═══════════════════════════════════════════════════════════ */
    @media (min-width: 560px) {
      :root {
        --btn-size:     64px;
        --btn-attack-h: 72px;
        --btn-sec-h:    52px;
        --btn-aux-h:    38px;
      }

      #controls {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: 12px;
      }

      #ctrl-log { flex: 1; }

      #ctrl-actions { width: 180px; }
    }

    /* ═══════════════════════════════════════════════════════════
       NARROW LAYOUT  (< 560 px — portrait phone)
       Controls: 2×2 grid
         [dpad    | actions]
         [minimap | log    ]
       ═══════════════════════════════════════════════════════════ */
    @media (max-width: 559px) {
      :root {
        --btn-size:     58px;
        --btn-attack-h: 64px;
        --btn-sec-h:    46px;
        --btn-aux-h:    34px;
      }

      #controls {
        display: grid;
        grid-template-columns: auto 1fr;
        grid-template-rows: auto auto;
        gap: 8px;
      }

      #ctrl-dpad    { grid-row: 1; grid-column: 1; }
      #ctrl-actions { grid-row: 1; grid-column: 2; }
      #ctrl-minimap { grid-row: 2; grid-column: 1; }
      #ctrl-log     { grid-row: 2; grid-column: 2; align-self: end; }
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="controls">

    <!-- ── Minimap ────────────────────────────────────────── -->
    <div id="ctrl-minimap">
      <canvas id="minimap-canvas"></canvas>
      <div id="minimap-stats">
        <span class="stat-hp">-- / -- HP</span>
        <span class="stat-floor">loading…</span>
        <span class="stat-dir">--</span>
      </div>
    </div>

    <!-- ── D-pad ──────────────────────────────────────────── -->
    <div id="ctrl-dpad">
      <!-- Row 1: only FORWARD in centre -->
      <div></div>
      <button class="btn btn-dpad" data-action="MOVE_FORWARD">▲</button>
      <div></div>
      <!-- Row 2: LEFT  BACK  RIGHT -->
      <button class="btn btn-dpad" data-action="TURN_LEFT">◀</button>
      <button class="btn btn-dpad" data-action="MOVE_BACK">▼</button>
      <button class="btn btn-dpad" data-action="TURN_RIGHT">▶</button>
    </div>

    <!-- ── Action buttons ─────────────────────────────────── -->
    <div id="ctrl-actions">
      <button class="btn btn-attack" data-action="ATTACK">⚔ ATTACK</button>
      <div class="btn-row">
        <button class="btn btn-use"      data-action="USE_ITEM">⚗ USE ITEM</button>
        <button class="btn btn-interact" data-action="INTERACT">✦ OPEN</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-aux" data-action="CANCEL">MENU</button>
        <button class="btn btn-aux" data-action="OPEN_INVENTORY">INV</button>
      </div>
    </div>

    <!-- ── Combat log ─────────────────────────────────────── -->
    <div id="ctrl-log">
      <div id="combat-log"></div>
    </div>

  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
